<!DOCTYPE html>
<html>
<head>
    <title>Form Creation</title>
</head>
<body>

<h2>Registration Form</h2>

<form onsubmit="return alert_msg()">

    Name:
    <input type="text" id="name"><br><br>

    Gender:
    <input type="radio" name="Gender" value="Male"> Male
    <input type="radio" name="Gender" value="Female"> Female
    <br><br>

    Email:
    <input type="text" id="email"><br><br>

    Mobile Number:
    <input type="text" id="phone_number"><br><br>

    Password:
    <input type="password" id="password"><br><br>

    <input type="submit" value="Register">

</form>

<p id="demo">Welcome</p>

<button onclick="changeText()">Change Text</button>

<script>
function alert_msg() {

    // Name Validation
    if (document.getElementById("name").value.trim() == "") {
        alert("Enter your Name");
        return false;
    }

    // Email Validation
    let em = document.getElementById("email").value;
    let emailpattern = /^[^\s@]+@[^\s@]+\.[a-zA-Z]{2,3}$/;

    if (em == "" || !emailpattern.test(em)) {
        alert("Enter a Valid Email ID");
        return false;
    }

    // Mobile Validation
    let mobile = document.getElementById("phone_number").value;
    let mobilepattern = /^(?:\+91|91|0)?[6-9]\d{9}$/;

    if (mobile == "" || !mobilepattern.test(mobile)) {
        alert("Enter a Valid Mobile Number");
        return false;
    }

    // Password Validation
    let pass = document.getElementById("password").value;

    if (pass == "" || pass.length != 6) {
        alert("Password must contain exactly 6 characters");
        return false;
    }

    alert("Registration Successful!");
    return true;
}

function changeText() {
    document.getElementById("demo").style.color = "red";
    document.getElementById("demo").style.fontSize = "30px";
    document.getElementById("demo").innerHTML = "Welcome to Computer Technology";
}
</script>

</body>
</html>
